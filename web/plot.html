<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>나노리본 에너지 분산 그래프 (새 창 모드)</title>
  <script src="plotly-2.27.0.min.js"></script>
  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #fafbff; }

<body>
  <div id="header">나노리본 에너지 분산 (Dispersion) │ 상태 선택을 위해 마커(점)를 클릭하세요.</div>

</html>
